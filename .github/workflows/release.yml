name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── macOS (arm64 + x64) ──────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --legacy-peer-deps

      - name: Build & publish (macOS)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build:mac -- --publish always

  # ── Windows (x64) ────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build & publish (Windows)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build:win -- --publish always

  # ── Linux (AppImage + deb) ───────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3-dev libatk-bridge2.0-dev libdrm-dev \
            libxkbcommon-dev libgbm-dev libasound2-dev libxss1 libgtk-3-dev \
            libxshmfence-dev

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build & publish (Linux)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build:linux -- --publish always
